name: Supabase Keep-Alive

# El plan gratis de Supabase pausa el proyecto tras 7 días sin actividad de DB.
# Este workflow pinguea la tabla `keep_alive` cada 3 días para que el timer
# nunca llegue a 0. Es gratis y se puede correr manualmente desde Actions UI.
#
# Configurar dos secrets en el repo (Settings → Secrets → Actions):
#   SUPABASE_URL          → https://<project-ref>.supabase.co
#   SUPABASE_ANON_KEY     → la anon key (publishable, no service role)

on:
  schedule:
    - cron: "0 9 */3 * *" # cada 3 días a las 09:00 UTC
  workflow_dispatch: # permite correrlo a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert keep_alive row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::Secrets SUPABASE_URL o SUPABASE_ANON_KEY no configurados; skipping."
            exit 0
          fi

          status=$(curl -sS -o /tmp/keep_alive.out -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/keep_alive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"pinged_at": null}')

          echo "HTTP $status"
          cat /tmp/keep_alive.out
          if [ "$status" -ge 400 ]; then
            echo "::error::Ping a Supabase falló con status $status"
            exit 1
          fi
