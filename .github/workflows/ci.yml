name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true # tenemos warnings pre-existentes; no bloquea aún

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:run

      - name: Build
        env:
          # En CI corremos con backend mock para no necesitar Supabase real.
          NEXT_PUBLIC_DATA_BACKEND: mock
        run: pnpm build
